version: "3.8"

services:
  # ─── MongoDB ──────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: servora-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - servora-network
    restart: unless-stopped

  # ─── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: servora-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - servora-network
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  servora-network:
    driver: bridge
